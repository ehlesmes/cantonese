<link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
/>
<link rel="stylesheet" href="/components/shared/variables.css" />
<script src="/components/lesson_viewer/lesson_viewer.js" type="module"></script>
<script src="/components/reading_page/reading_page.js" type="module"></script>

<body style="margin: 0">
  <lesson-viewer id="viewer">
    <reading-page id="page"></reading-page>
  </lesson-viewer>

  <script type="module">
    document.getElementById("viewer").data = { lessonName: "Basic Greetings" };
    document.getElementById("page").data = {
      cantonesePhrase: "你好！",
      romanization: "nei5 hou2!",
      translation: "Hello!",
    };

    // Listen for the assessment result
    document.addEventListener("reading-result", (e) => {
      console.log(
        "User assessment result:",
        e.detail.success ? "Passed" : "Needs Practice",
      );
      alert(e.detail.success ? "Great job!" : "Keep practicing!");
    });
  </script>
</body>
