<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantonese Learning App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="loading-state" class="hidden" style="text-align: center; padding: 5rem; font-size: 1.5rem; color: #666;">Loading...</div>
    
    <header id="app-header" class="hidden">
        <button id="prev-btn" class="nav-btn">←</button>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <button id="next-btn" class="nav-btn">→</button>
    </header>

    <main id="app" class="hidden">
        <div id="completion-overlay" class="hidden" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; min-height: 100vh; background: rgba(255, 255, 255, 0.95); display: flex; justify-content: center; align-items: flex-start; z-index: 100; border-radius: 12px; overflow-y: auto; padding: 2rem 0;">
            <div id="completion-content" style="width: 100%; max-width: 800px; margin: auto; text-align: center; padding: 2rem;">
                <h2 style="font-size: 2.5rem; color: #e8491d; margin-bottom: 1rem;">Lesson Complete! 🎉</h2>
                <p style="font-size: 1.2rem; margin-bottom: 2rem;">Congratulations! you have finished this lesson.</p>
                <div id="completion-stats" style="margin: 2rem 0;"></div>
                <div style="display: flex; gap: 1rem; max-width: 500px; margin: 2rem auto 0;">
                    <button id="restart-lesson-btn" class="secondary-btn" style="flex: 1; margin: 0; padding: 1rem; font-size: 1.1rem; border-radius: 8px; cursor: pointer; border: none; color: white;">Review Lesson</button>
                    <button id="next-lesson-btn" class="action-btn" style="flex: 1; margin: 0; padding: 1rem; font-size: 1.1rem; border-radius: 8px; cursor: pointer; border: none; color: white;">Next Lesson</button>
                </div>
            </div>
        </div>

        <section id="page-card" style="text-align: center; max-width: 800px; margin: 0 auto;">
            <!-- Intro View -->
            <div id="intro-view" class="view hidden">
                <h2 id="intro-title" style="font-size: 2rem; color: #35424a;"></h2>
                <p id="intro-goal" style="font-size: 1.2rem; color: #666; margin-bottom: 2rem;"></p>
            </div>

            <!-- Learn View -->
            <div id="learn-view" class="view hidden">
                <h2 id="learn-title" style="color: #e8491d; margin-bottom: 1.5rem;"></h2>
                <div id="learn-content" class="rich-text"></div>
            </div>

            <!-- Practice View -->
            <div id="practice-view" class="view hidden">
                <header class="exercise-header">
                    <h3 style="margin-top: 0;">Practice</h3>
                </header>
                
                <div id="exercise-content" style="display: flex; flex-direction: column; align-items: center; gap: 2rem; margin: 2rem 0;">
                    <!-- Reading Mode -->
                    <div id="reading-display">
                        <div id="text-display">
                            <div id="chinese-text"></div>
                            <div id="romanization"></div>
                        </div>
                        <button id="play-btn" class="icon-btn" style="margin: 1rem auto;">🔊 Play</button>
                    </div>

                    <!-- Scrambled Mode -->
                    <div id="scrambled-display" class="hidden">
                        <div id="english-prompt" class="prompt-text"></div>
                        <div id="scrambled-slots" class="slots-container"></div>
                        <div id="scrambled-options" class="options-container"></div>
                        <div id="scrambled-status" class="status-message hidden"></div>
                    </div>
                    
                    <div id="translation-section" class="hidden" style="width: 100%;">
                        <hr style="border: 0; border-top: 1px solid #eee; margin: 2rem 0;">
                        <div id="english-translation" class="translation-text"></div>
                    </div>
                    
                    <div id="hint-btn-container" class="hidden" style="width: 100%;">
                        <button id="hint-btn" class="secondary-btn" style="width: auto; padding: 0.5rem 1.5rem; border-radius: 50px;">💡 Hint</button>
                    </div>
                </div>

                <audio id="audio-player">
                    <source src="" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>
        </section>
    </main>

    <footer id="app-footer" class="hidden">
        <!-- Intro Action -->
        <button id="start-lesson-btn" class="action-btn hidden" style="margin: 0;">Start Lesson</button>
        
        <!-- Learn Action -->
        <button id="learn-continue-btn" class="action-btn hidden" style="margin: 0;">Continue</button>

        <!-- Scrambled Checking Action -->
        <button id="check-scrambled-btn" class="action-btn hidden" style="margin: 0;">Check Answer</button>

        <!-- Standard Continue Action (Shared for solved scrambled / retries) -->
        <button id="scrambled-continue-btn" class="action-btn hidden" style="margin: 0;">Continue</button>

        <!-- Practice Reading Assessment -->
        <div id="assessment-actions" class="hidden" style="width: 100%;">
            <div class="btn-group" style="display: flex; gap: 1rem;">
                <button id="incorrect-btn" class="error-btn" style="flex: 1; margin: 0;">Need to review</button>
                <button id="correct-btn" class="success-btn" style="flex: 1; margin: 0;">Continue</button>
            </div>
        </div>

        <!-- Practice Retry -->
        <div id="retry-actions" class="hidden" style="width: 100%;">
            <div class="btn-group" style="display: flex; gap: 1rem;">
                <button id="retry-btn" class="secondary-btn" style="flex: 1; margin: 0;">Try Again</button>
                <button id="continue-btn" class="action-btn" style="flex: 1; margin: 0;">Continue</button>
            </div>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
