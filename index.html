<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cantonese Learning App</title>
    <link rel="stylesheet" href="components/shared/variables.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: var(--color-background);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script type="module">
      import { AppShell } from "./components/app_shell/app_shell.js";
      import { TabNav } from "./components/tab_nav/tab_nav.js";

      // Initialize Shell
      const shell = new AppShell();
      document.getElementById("app").appendChild(shell.element);

      // Initialize Nav
      const nav = new TabNav({
        tabs: [
          { label: "Home", hash: "#/home" },
          { label: "Vocabulary", hash: "#/vocabulary" },
        ],
      });

      // Inject Nav into Shell
      shell.setNav(nav);
    </script>
  </body>
</html>
