<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantonese Learning App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Cantonese Learning App</h1>
    </header>
    <div id="loading-state" class="hidden">Loading...</div>
    <main id="app">
        <div id="completion-overlay" class="hidden" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; min-height: 100vh; background: rgba(255, 255, 255, 0.95); display: flex; justify-content: center; align-items: flex-start; z-index: 100; border-radius: 12px; overflow-y: auto; padding: 2rem 0;">
            <div id="completion-content" style="width: 100%; max-width: 800px; margin: auto;">
                <h2>Lesson Complete! 🎉</h2>
                <p>Congratulations! you have finished this lesson.</p>
                <div id="completion-stats" style="margin: 2rem 0;"></div>
                <button id="next-lesson-btn">Next Lesson</button>
                <button id="restart-lesson-btn">Review Lesson</button>
            </div>
        </div>

        <header id="lesson-header">
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
        </header>

        <section id="page-card" class="card" style="background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 12px; padding: 2.5rem; text-align: center; margin: 2rem 0;">
            <!-- Intro View -->
            <div id="intro-view" class="view hidden">
                <h2 id="intro-title" style="font-size: 2rem; color: #35424a;"></h2>
                <p id="intro-goal" style="font-size: 1.2rem; color: #666; margin-bottom: 2rem;"></p>
                <button id="start-lesson-btn" class="action-btn">Start Lesson</button>
            </div>

            <!-- Learn View -->
            <div id="learn-view" class="view hidden">
                <h2 id="learn-title" style="color: #e8491d; margin-bottom: 1.5rem;"></h2>
                <div id="learn-content" class="rich-text"></div>
                
                <button id="learn-continue-btn" class="action-btn" style="margin-top: 2rem;">Continue</button>
            </div>

            <!-- Practice View -->
            <div id="practice-view" class="view hidden">
                <header class="exercise-header">
                    <h3>Practice</h3>
                    <div id="exercise-prompt" class="hidden">Translate this sentence:</div>
                </header>
                
                <div id="exercise-content">
                    <!-- Reading Mode -->
                    <div id="reading-display">
                        <div id="text-display">
                            <div id="chinese-text"></div>
                            <div id="romanization"></div>
                        </div>
                        <button id="play-btn" class="icon-btn">🔊 Play</button>
                    </div>

                    <!-- Scrambled Mode -->
                    <div id="scrambled-display" class="hidden">
                        <div id="english-prompt" class="prompt-text"></div>
                        <div id="scrambled-slots" class="slots-container"></div>
                        <div id="scrambled-options" class="options-container"></div>
                        <div id="scrambled-status" class="status-message hidden"></div>
                        <button id="check-scrambled-btn" class="action-btn">Check Answer</button>
                    </div>
                    
                    <div id="translation-section" class="hidden">
                        <hr>
                        <div id="english-translation" class="translation-text"></div>
                    </div>

                    <div id="exercise-actions">
                        <button id="hint-btn" class="secondary-btn">Hint</button>
                        <div id="assessment-actions">
                            <p>Did you get it right?</p>
                            <div class="btn-group">
                                <button id="incorrect-btn" class="error-btn">No</button>
                                <button id="correct-btn" class="success-btn">Yes</button>
                            </div>
                        </div>
                        <div id="retry-actions" class="hidden">
                            <p>Would you like to try again or continue?</p>
                            <div class="btn-group">
                                <button id="retry-btn" class="secondary-btn">Try Again</button>
                                <button id="continue-btn" class="action-btn" style="margin-top: 0;">Continue</button>
                            </div>
                        </div>
                        <div id="continue-action" class="hidden">
                            <button id="scrambled-continue-btn" class="action-btn">Continue</button>
                        </div>
                    </div>
                </div>

                <audio id="audio-player">
                    <source src="" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>
        </section>

        <nav id="navigation">
            <button id="prev-btn">Previous</button>
            <button id="next-btn" class="hidden">Next</button>
        </nav>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
