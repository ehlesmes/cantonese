<meta charset="UTF-8" />
<link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
/>
<link rel="stylesheet" href="/components/shared/variables.css" />
<script src="/components/lesson_viewer/lesson_viewer.js" type="module"></script>
<script
  src="/components/unscramble_page/unscramble_page.js"
  type="module"
></script>

<body style="margin: 0">
  <lesson-viewer id="viewer">
    <unscramble-page id="page"></unscramble-page>
  </lesson-viewer>

  <script type="module">
    document.getElementById("viewer").data = { lessonName: "Basic Greetings" };
    document.getElementById("page").data = {
      tokens: [
        ["我", "ngo5"],
        ["係", "hai6"],
        ["學生", "hok6 saang1"],
      ],
      translation: "I am a student",
    };

    // Listen for the assessment result
    document.addEventListener("unscramble-result", (e) => {
      console.log(
        "User unscramble result:",
        e.detail.success ? "Correct" : "Incorrect",
      );
      alert(e.detail.success ? "Excellent!" : "Keep trying!");
    });
  </script>
</body>
