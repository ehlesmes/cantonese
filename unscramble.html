<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unscramble Exercise</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <link rel="stylesheet" href="/components/shared/variables.css" />
    <script
      src="/components/lesson_viewer/lesson_viewer.js"
      type="module"
    ></script>
    <script
      src="/components/unscramble_page/unscramble_page.js"
      type="module"
    ></script>
  </head>
  <body
    style="
      margin: 0;
      background-color: #f8f9fa;
      font-family: var(--md-sys-font-family);
    "
  >
    <script type="module">
      import { LessonViewer } from "./components/lesson_viewer/lesson_viewer.js";
      import { UnscramblePage } from "./components/unscramble_page/unscramble_page.js";

      const viewer = new LessonViewer({
        lessonId: "demo-unscramble",
        lessonName: "Basic Greetings",
      });
      const page = new UnscramblePage({
        tokens: [
          ["我", "ngo5"],
          ["係", "hai6"],
          ["學生", "hok6 saang1"],
        ],
        translation: "I am a student",
      });

      viewer.shadowRoot.getElementById("m").appendChild(page.element);
      document.body.appendChild(viewer.element);

      // Listen for the assessment result
      document.addEventListener("unscramble-result", (e) => {
        console.log(
          "User unscramble result:",
          e.detail.success ? "Correct" : "Incorrect",
        );
        alert(e.detail.success ? "Excellent!" : "Keep trying!");
      });
    </script>
  </body>
</html>
